# Airflow local stack (v1 stub).
#
# Full Airflow (webserver, scheduler, workers, Redis, etc.) is intentionally
# not enabled by default — it is heavy for local laptops. Uncomment and tune
# the services below when you are ready, then start with:
#   AIRFLOW_ENABLED=1 bash DevOps/Local/docker-all-up.sh
#
# All services must use container_name prefix filesearch-local-airflow-* and
# join the external network filesearch-local-net.

networks:
  filesearch-local-net:
    external: true

